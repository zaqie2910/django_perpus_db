{% extends 'base.html' %}

{% block title %}{% if siswa %}Edit{% else %}Tambah{% endif %} User - SIPUSTAKA{% endblock %}

{% block content %}
<div class="space-y-6">
  <div class="flex items-center gap-3">
    <a href="{% url 'siswa_list' %}" class="text-slate-500 hover:text-slate-700 transition flex items-center">
      <span class="material-icons-outlined">arrow_back</span>
    </a>
    <div>
      <p class="text-slate-500 text-sm">Formulir manajemen anggota.</p>
      <h3 class="text-2xl font-bold text-slate-900">{% if siswa %}Edit Data User{% else %}Tambah User Baru{% endif %}</h3>
    </div>
  </div>

  <div class="rounded-3xl bg-white p-6 shadow-sm border border-slate-200 max-w-4xl">
    <form method="POST" class="space-y-4">
      {% csrf_token %}
      <div class="grid gap-4 sm:grid-cols-2">
        <label class="block">
          <span class="text-sm font-medium text-slate-700">Nama Lengkap</span>
          <input name="nama" type="text" value="{{ siswa.nama|default:'' }}" class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100" placeholder="Masukkan nama lengkap" required />
        </label>
        <label class="block">
          <span class="text-sm font-medium text-slate-700">Kelas</span>
          <input name="kelas" type="text" value="{{ siswa.kelas|default:'' }}" class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100" placeholder="Contoh: X RPL 1" required />
        </label>
      </div>
      
      <div class="grid gap-4 sm:grid-cols-2">
        <label class="block">
          <span class="text-sm font-medium text-slate-700">NIS</span>
          <input name="nis" type="text" inputmode="numeric" value="{{ siswa.nis|default:'' }}" class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100" placeholder="Contoh: 1001" required />
        </label>
        <label class="block">
          <span class="text-sm font-medium text-slate-700">Status Akun</span>
          <select name="status" class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100" required>
            <option value="Aktif" {% if siswa.status == 'Aktif' %}selected{% endif %}>Aktif</option>
            <option value="Tidak Aktif" {% if siswa.status == 'Tidak Aktif' %}selected{% endif %}>Tidak Aktif</option>
          </select>
        </label>
      </div>

      <div class="flex items-center justify-end gap-3 pt-4 border-t border-slate-200">
        <a href="{% url 'siswa_list' %}" class="rounded-2xl border border-slate-300 px-5 py-3 text-slate-700 hover:bg-slate-100 transition font-medium">Batal</a>
        <button type="submit" class="rounded-2xl bg-blue-600 px-5 py-3 text-white hover:bg-blue-700 transition font-medium shadow-sm">Simpan Data</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
