{% extends 'base.html' %}

{% block title %}Form Buku - SIPUSTAKA{% endblock %}

{% block content %}
<div class="space-y-6">
  <div class="flex items-center gap-3">
    <a href="{% url 'buku' %}" class="text-slate-500 hover:text-slate-700 transition flex items-center">
      <span class="material-icons-outlined">arrow_back</span>
    </a>
    <div>
      <p class="text-slate-500 text-sm">Formulir data koleksi buku.</p>
      <h3 class="text-2xl font-bold text-slate-900">{% if buku %}Edit Buku{% else %}Tambah Buku Baru{% endif %}</h3>
    </div>
  </div>

  <div class="rounded-3xl bg-white p-6 shadow-sm border border-slate-200 max-w-4xl">
    <form method="POST" class="space-y-4">
      {% csrf_token %}
      <div class="grid gap-4 sm:grid-cols-2">
        <label class="block">
          <span class="text-sm font-medium text-slate-700">Judul Buku</span>
          <input name="judul" type="text" value="{{ buku.judul|default:'' }}"
            class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100"
            required />
        </label>
        <label class="block">
          <span class="text-sm font-medium text-slate-700">Penerbit</span>
          <input name="penerbit" type="text" value="{{ buku.penerbit|default:'' }}"
            class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100"
            required />
        </label>
      </div>
      <div class="grid gap-4 sm:grid-cols-2">
        <label class="block">
          <span class="text-sm font-medium text-slate-700">Jumlah Stok</span>
          <input name="stok" type="number" value="{{ buku.stok|default:'1' }}"
            class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100"
            required />
        </label>
      </div>
      <div class="flex items-center justify-end gap-3 pt-4 border-t border-slate-200">
        <a href="{% url 'buku' %}"
          class="rounded-2xl border border-slate-300 px-5 py-3 text-slate-700 hover:bg-slate-100 transition font-medium">Batal</a>
        <button type="submit"
          class="rounded-2xl bg-blue-600 px-5 py-3 text-white hover:bg-blue-700 transition font-medium">Simpan
          Buku</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
