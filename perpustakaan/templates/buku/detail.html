{% extends 'base.html' %}

{% block title %}Detail Buku - SIPUSTAKA{% endblock %}

{% block content %}
<div class="space-y-6">
  <div class="flex items-center gap-3">
    <a href="{% url 'buku' %}" class="text-slate-500 hover:text-slate-700 transition flex items-center">
      <span class="material-icons-outlined">arrow_back</span>
    </a>
    <div>
      <p class="text-slate-500 text-sm">Informasi detail katalog buku.</p>
      <h3 class="text-2xl font-bold text-slate-900">Detail Buku</h3>
    </div>
  </div>

  <div class="bg-white rounded-3xl p-8 border border-slate-200 shadow-sm max-w-2xl space-y-6">
    <div class="grid grid-cols-2 gap-6">
      <div class="bg-slate-50/60 p-4 rounded-2xl border border-slate-100 col-span-2">
        <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Judul Lengkap</span>
        <p class="text-xl font-bold text-slate-800 mt-1">{{ buku.judul }}</p>
      </div>
      <div class="bg-slate-50/60 p-4 rounded-2xl border border-slate-100">
        <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Penerbit</span>
        <p class="text-lg font-semibold text-slate-800 mt-1">{{ buku.penerbit }}</p>
      </div>
      <div class="bg-slate-50/60 p-4 rounded-2xl border border-slate-100">
        <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Tersedia (Stok)</span>
        <p class="text-lg font-bold text-slate-800 mt-1">{{ buku.stok }} Ekslempar</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
