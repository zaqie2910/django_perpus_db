{% extends 'base.html' %}

{% block title %}Transaksi Pinjam - SIPUSTAKA{% endblock %}

{% block content %}
<div class="space-y-6">
  <div class="flex items-center gap-3">
    <a href="{% url 'peminjaman' %}" class="text-slate-500 hover:text-slate-700 transition flex items-center">
      <span class="material-icons-outlined">arrow_back</span>
    </a>
    <div>
      <p class="text-slate-500 text-sm">Input peminjaman baru.</p>
      <h3 class="text-2xl font-bold text-slate-900">Form Peminjaman Buku</h3>
    </div>
  </div>

  <div class="rounded-3xl bg-white p-6 shadow-sm border border-slate-200 max-w-2xl">
    <form method="POST" action="{% url 'peminjaman_tambah' %}" class="space-y-4">
      {% csrf_token %}

      <div>
        <label class="block text-sm font-medium text-slate-700">Pilih User / Siswa</label>
        <select name="siswa_id"
          class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100"
          required>
          <option value="" disabled selected>Pilih Siswa</option>
          {% for s in daftar_siswa %}
          <option value="{{ s.id }}">{{ s.nama }} ({{ s.kelas }})</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700">Pilih Buku</label>
        <select name="buku_id"
          class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100"
          required>
          <option value="" disabled selected>Pilih Buku</option>
          {% for b in daftar_buku %}
          <option value="{{ b.id }}">{{ b.judul }} (Stok: {{ b.stok }})</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700">Tanggal Jatuh Tempo</label>
        <input type="date" name="jatuh_tempo" required
          class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100">
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700">Keperluan</label>
        <textarea name="keperluan" rows="3" required placeholder="Contoh: Tugas mandiri kelompok, bacaan di kelas"
          class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 resize-none"></textarea>
      </div>

      <div class="flex items-center justify-end gap-3 pt-4 border-t border-slate-200">
        <a href="{% url 'peminjaman' %}"
          class="rounded-2xl border border-slate-300 px-5 py-3 text-slate-700 hover:bg-slate-100 transition font-medium">Batal</a>
        <button type="submit"
          class="rounded-2xl bg-blue-600 px-5 py-3 text-white hover:bg-blue-700 transition font-medium">Buat
          Transaksi</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
